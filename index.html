<!DOCTYPE html>
<html>
<head>
  <title>Happy Birthday ❤️</title>
  <style>
    body {
      background-color: #ffeef2;
      text-align: center;
      font-family: Arial;
      padding: 50px;
    }
    h1 {
      color: #ff4d6d;
    }
    .card {
      background: white;
      padding: 20px;
      border-radius: 20px;
      display: inline-block;
      box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    }
    button {
      padding: 10px 20px;
      border: none;
      background: #ff4d6d;
      color: white;
      border-radius: 10px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<div class="card">
  <h1>Happy Birthday, My Love 🎂</h1>
  <p id="text">Click the button ❤️</p>
  <button onclick="showMessage()">Open Message</button>
</div>

<script>
function showMessage() {
  document.getElementById("text").innerHTML =
  "Aku bersyukur banget punya kamu. Semoga kamu selalu bahagia, sehat, dan semua yang kamu impikan tercapai. I love you ❤️";
}
</script>

</body>
</html>
